<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }
        form {
            background: white;
            padding: 20px;
            margin: auto;
            width: 300px;
            border-radius: 10px;
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }
        button {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>Student Registration Form</h2>

<form action="/submit" method="post">
    
    <label>Name:</label><br>
    <input type="text" name="name" required><br>

    <label>Email:</label><br>
    <input type="email" name="email" required><br>

    <br>
    <button type="submit">Submit</button>

</form>

</body>
</html>
